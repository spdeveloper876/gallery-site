<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Login</title>

<style>
* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: Arial, sans-serif;
}

body {
    height: 100vh;
    background: linear-gradient(135deg, #667eea, #764ba2);
    display: flex;
    justify-content: center;
    align-items: center;
}

/* Glass Card */
.container {
    background: rgba(255,255,255,0.1);
    backdrop-filter: blur(10px);
    padding: 30px;
    border-radius: 15px;
    width: 90%;
    max-width: 350px;
    color: white;
    text-align: center;
}

.container h2 {
    margin-bottom: 20px;
}

input {
    width: 100%;
    padding: 12px;
    margin: 10px 0;
    border: none;
    border-radius: 8px;
    outline: none;
}

button {
    width: 100%;
    padding: 12px;
    border: none;
    background: #00c6ff;
    color: white;
    border-radius: 8px;
    cursor: pointer;
    font-size: 16px;
    margin-top: 10px;
}

button:hover {
    background: #0072ff;
}

/* Loader */
.loader {
    display: none;
    margin-top: 15px;
}

.loader div {
    width: 10px;
    height: 10px;
    background: white;
    margin: 3px;
    border-radius: 50%;
    display: inline-block;
    animation: bounce 0.6s infinite alternate;
}

.loader div:nth-child(2) { animation-delay: 0.2s; }
.loader div:nth-child(3) { animation-delay: 0.4s; }

@keyframes bounce {
    to { transform: translateY(-10px); }
}

/* Mobile */
@media(max-width: 400px) {
    .container {
        padding: 20px;
    }
}
</style>
</head>

<body>

<div class="container">
    <h2>🔐 Secure Login</h2>

    <input type="text" id="user" placeholder="Username">
    <input type="password" id="pass" placeholder="Password">

    <button onclick="login()">Login</button>
	
	<button onclick="login()"><a class="btn btn-sm btn-outline-primary rounded-pill order-1 order-lg-0 ms-lg-4" href="index.html">Home</a></button>

    <div class="loader" id="loader">
        <div></div><div></div><div></div>
    </div>
</div>

<script>
function login() {
    let u = document.getElementById("user").value;
    let p = document.getElementById("pass").value;
    let loader = document.getElementById("loader");

    loader.style.display = "block";

    // Fake server delay
    setTimeout(() => {
        if(u === "admin" && p === "1234") {
            localStorage.setItem("isLoggedIn", "true");
            window.location.href = "dashboard.html";
        } else {
            loader.style.display = "none";
            alert("Invalid credentials");
        }
    }, 1500);
}
</script>

</body>
</html>
